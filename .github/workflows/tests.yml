name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: stable
          variant: CS

      - name: Install lazy package
        run: raco pkg install --auto lazy

      - name: Run test suite
        run: ./run-all-tests.sh
